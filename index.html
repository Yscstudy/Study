<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习助手 — 知识复习 & 刷题</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1><span>📖</span>学习助手</h1>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="review">📚 知识复习</button>
        <button class="tab-btn" data-tab="quiz">✏️ 刷题练习</button>
      </nav>
    </div>
  </header>
  <main class="main">
    <section class="panel active" id="panel-review">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜索知识点...">
      </div>
      <div class="category-filters" id="category-filters"></div>
      <div class="knowledge-list" id="knowledge-list"></div>
    </section>
    <section class="panel" id="panel-quiz">
      <div class="quiz-progress">
        <div class="progress-stats">
          <span id="quiz-progress-text">选择一个分类开始刷题</span>
        </div>
        <div class="progress-bar">
          <div class="fill" id="quiz-progress-fill" style="width: 0%;"></div>
        </div>
      </div>
      <div id="quiz-home">
        <h3 style="margin-bottom:16px;">📝 选择题目类型</h3>
        <div class="quiz-categories" id="quiz-cats"></div>
      </div>
      <div id="quiz-active" style="display:none;"></div>
    </section>
  </main>
  <script src="data/knowledge.js"></script>
  <script src="data/prob-stat-knowledge.js"></script>
  <script src="data/questions.js"></script>
  <script src="data/prob-stat-questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
